services:
  postgres:
    image: postgres:16-alpine
    container_name: gymflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gymflow}
      POSTGRES_USER: ${DB_USERNAME:-gymflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gymflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - gymflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gymflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gymflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-gymflow}
      DB_USERNAME: ${DB_USERNAME:-gymflow}
      DB_PASSWORD: ${DB_PASSWORD:-gymflow}
      JWT_SECRET: ${JWT_SECRET:-c2VjcmV0LWRldi1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tZW52aXJvbm1lbnQtcGxlYXNlLTEyMzQ1Ng==}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - gymflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: gymflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - gymflow-network

volumes:
  gymflow-postgres-data:

networks:
  gymflow-network:
    driver: bridge
